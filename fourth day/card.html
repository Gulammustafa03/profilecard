<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            width: 300px;
            border: 1px solid black;
            padding-top: 10px;

        }
        .div1{

        }
        img{
            width: 280px;
            margin-top: 10px;
            margin-bottom: 0px;
        }
        .sale{
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: red;
            color: white;
            padding: 5px 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 15px;
        }
        .heart{
            position: absolute;
            top:10px;
            margin-left: 272px;
            color: red;
            font-size: 20px;
        }
        h1{
            margin-top: 0px;
            margin-left: 10px;
        }
        .desc{
            margin-top: 0px;
            margin-left: 10px;
        }
        .price1{
            margin-left: 10px;
            margin-right: 10px;
            display: inline-block;
            text-decoration: line-through;
            margin-bottom: 10px;
        }
        .price2{
            display: inline-block;
            font-size: 25px;
            color: green;
            font-weight: bold;
        }
        button{
            background-color: blue;
            border: 1px solid black;
            margin-bottom: 10px;
            margin-left: 80px;
            padding-left: 40px;
            padding-right: 40px;
            padding-top: 10px;
            padding-bottom: 10px;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        :hover button{
            color: #000;
            background-color: red;
        }
        :hover

    </style>
</head>
<body>
    <div class="main">
        <div class="div1">
            <img src="https://www.apetogentleman.com/wp-content/uploads/2020/01/greastestsneakerbrands5.jpg" alt="shoe">
            <div class="sale">SALE</div>
            <div class="heart">❤</div>
        </div>
        <div class="div2">
            <h1 class="tag">Shoes</h1>
            <div class="price1">&#8377 5999</div>
            <div class="price2">&#8377 4999</div>
            <p class="desc">Comfortable and stylish shoes for everyday wear.</p>
            <button class="buy-btn">Buy Now</button>
        </div>
    </div>
</body>
</html>
