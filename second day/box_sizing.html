<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 110px;
            height: 380px;
            border: 1.5px solid black;
            margin-left: auto;
            margin-right: auto;
            background-color:black;
            border-radius: 10px;
        }
        .inner-box1{
            width: 100px;
            height: 100px;
            border-radius: 100%;
            background-color: red;
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
            
        }
        .inner-box2{
            width: 100px;
            height: 100px;
            border-radius: 100%;
            background-color: yellow;
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
        }
        .inner-box3{
            width: 100px;
            height: 100px;
            border-radius: 100%;
            background-color: green;
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="inner-box1"></div>
        <div class="inner-box2"></div>
        <div class="inner-box3"></div>
    </div>
</body>
</html>
