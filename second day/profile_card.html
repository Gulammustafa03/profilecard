<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .profile{
            width: 220px;
            border: 1px solid black;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            background-color: #f0f0f0;

        }
        .heading{
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 18px;

        }
        img{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 1.5px solid rgb(109, 103, 103);
            object-fit: cover;
            
        }
        .name{
            font-size: 20px;
            font-weight: bold;
            margin-top:0px;
            margin-bottom: 0px;
        }
        .title{
            font-size: 16px;
            color: gray;
            margin-top: 8px;
            margin-bottom: 20px;
        }
        .follow-btn{
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 150px;
            font-size: 16px;

        }
    </style>
</head>
<body>
    <div class="profile">
        <div class="heading">Profile</div>
        <div class="image">
            <img src="https://imgcdn.stablediffusionweb.com/2024/12/11/35a41202-c7ab-467b-ac37-81e8f13d6eb7.jpg" alt="Profile Picture">
        </div>
        <div class="details">
            <p class="name">Mustafa</p>
            <p class="title">MERN Developer</p>
            <button class="follow-btn">Follow</button>
        </div>
    </div>
</body>
</html>
